<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Nihongo</title>
  <link rel="stylesheet" href="src/main.css">
  <link rel="stylesheet" href="src/pages/keypad/keypad.css">
</head>
<body>
  <div class="wrapper">
    <div class="content">
    </div>
    <div class="footer">
      <div class="keypad">
        <div class="key-row">
          <div class="key" data-id="`"></div>
          <div class="key" data-id="1"></div>
          <div class="key" data-id="2"></div>
          <div class="key" data-id="3"></div>
          <div class="key" data-id="4"></div>
          <div class="key" data-id="5"></div>
          <div class="key" data-id="6"></div>
          <div class="key" data-id="7"></div>
          <div class="key" data-id="8"></div>
          <div class="key" data-id="9"></div>
          <div class="key" data-id="0"></div>
          <div class="key" data-id="-"></div>
          <div class="key" data-id="="></div>
          <div class="key backspace" data-id="backspace"></div>
        </div>
        <div class="key-row">
          <div class="key" data-id="tab"></div>
          <div class="key" data-id="q"></div>
          <div class="key" data-id="w"></div>
          <div class="key" data-id="e"></div>
          <div class="key" data-id="r"></div>
          <div class="key" data-id="t"></div>
          <div class="key" data-id="y"></div>
          <div class="key" data-id="u"></div>
          <div class="key" data-id="i"></div>
          <div class="key" data-id="o"></div>
          <div class="key" data-id="p"></div>
          <div class="key" data-id="["></div>
          <div class="key" data-id="]"></div>
          <div class="key" data-id="\"></div>
        </div>
        <div class="key-row">
          <div class="key" data-id="caps-lock"></div>
          <div class="key" data-id="a"></div>
          <div class="key" data-id="s"></div>
          <div class="key" data-id="d"></div>
          <div class="key" data-id="f"></div>
          <div class="key" data-id="g"></div>
          <div class="key" data-id="h"></div>
          <div class="key" data-id="j"></div>
          <div class="key" data-id="k"></div>
          <div class="key" data-id="l"></div>
          <div class="key" data-id=";"></div>
          <div class="key" data-id="'"></div>
          <div class="key" data-id="enter"></div>
        </div>
        <div class="key-row">
          <div class="key" data-id="left-shift"></div>
          <div class="key" data-id="z"></div>
          <div class="key" data-id="x"></div>
          <div class="key" data-id="c"></div>
          <div class="key" data-id="v"></div>
          <div class="key" data-id="b"></div>
          <div class="key" data-id="n"></div>
          <div class="key" data-id="m"></div>
          <div class="key" data-id=","></div>
          <div class="key" data-id="."></div>
          <div class="key" data-id="/"></div>
          <div class="key" data-id="right-shift"></div>
        </div>
        <div class="key-row">
          <div class="key" data-id="left-ctrl"></div>
          <div class="key" data-id="fn"></div>
          <div class="key" data-id="alt"></div>
          <div class="key" data-id="space"></div>
          <div class="key" data-id="alt-gr"></div>
          <div class="key" data-id="win"></div>
          <div class="key" data-id="menu"></div>
          <div class="key" data-id="right-ctrl"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="src/pages/keypad/keypad.js" type="module"></script>
</body>
</html>
